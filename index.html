<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By His Side 📸</title>

    <!-- FUENTE CURSIVA ELEGANTE -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <!-- 1. PARA ANDROID -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- 2. PARA IPHONE -->
    <link rel="apple-touch-icon" href="https://i.pinimg.com/736x/18/9f/75/189f7556dcb1da733939f8b668bdde68.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ByHisSide">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f0f4f0; 
            margin: 0; 
            padding-bottom: 80px; 
        }

        /* ESTILO PARA LAS LETRAS CURSIVAS */
        .titulo-cursivo {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            color: #2d5a27;
            margin: 10px 0;
        }

        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; box-sizing: border-box; }
        
        .card { 
            background: white; 
            border: 1px solid #c2d6c2; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #a3bfa3; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
        }

        button { 
            width: 100%; 
            background: #2d5a27; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:active { background: #1b3a1a; }
        
        .profile-header { display: flex; align-items: center; padding: 20px 0; }
        .profile-pic { 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            border: 2px solid #2d5a27; 
            object-fit: cover; 
            background: #eee;
        }
        
        .profile-stats { flex: 1; display: flex; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; display: block; font-size: 17px; color: #1b3a1a; }
        .profile-name-bar { font-size: 18px; font-weight: bold; margin-bottom: 4px; color: #1b3a1a; }
        .profile-bio { font-size: 14px; margin: 0; color: #4a5d4a; }

        .navbar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            border-top: 1px solid #c2d6c2; 
            display: flex; 
            justify-content: space-around; 
            padding: 10px 0; 
            z-index: 1000; 
        }
        .nav-item { cursor: pointer; font-size: 24px; background: none; border: none; padding: 10px; }
        .hidden { display: none; }
        
        header { 
            background: white; 
            border-bottom: 1px solid #c2d6c2; 
            padding: 10px; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <div class="card" style="text-align: center;">
            <h2 class="titulo-cursivo">By His Side</h2>
            <input type="text" id="username" placeholder="Tu alias">
            <input type="text" id="email" placeholder="Correo">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
            <button onclick="registro()" style="background: #6fb98f; margin-top: 10px;">Crear cuenta</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header><div class="titulo-cursivo" style="font-size: 24px; margin: 0;">By His Side</div></header>
        <div class="container">
            <div id="view-home"><div id="feed-general"></div></div>
            
            <div id="view-search" class="hidden">
                <div class="card">
                    <h3>🔍 Buscar Amigos</h3>
                    <input type="text" id="buscar-username" placeholder="Alias exacto">
                    <button onclick="agregarPorNombre()">Agregar</button>
                </div>
            </div>

            <div id="view-upload" class="hidden">
                <div class="card">
                    <h3>➕ Nuevo Recuerdo</h3>
                    <input type="file" id="archivo" accept="image/*">
                    <input type="text" id="pie" placeholder="Descripción...">
                    <button id="btn-subir" onclick="subirFoto()">Publicar</button>
                </div>
            </div>

            <div id="view-profile" class="hidden">
                <div class="profile-header">
                    <img id="my-profile-pic" class="profile-pic" src="">
                    <div class="profile-stats">
                        <div><span class="stat-num" id="num-posts">0</span><span>recuerdos</span></div>
                        <div><span class="stat-num" id="num-amigos">0</span><span>amigos</span></div>
                    </div>
                </div>
                <div id="profile-alias" class="profile-name-bar">Usuario</div>
                <p id="profile-descripcion" class="profile-bio">Welcome to By His Side ✨</p>
                
                <div style="display:flex; gap:8px; margin: 15px 0;">
                    <button onclick="toggleEdit()" style="background: #e8eee8; color: #2d5a27; flex: 1;">Editar perfil</button>
                    <button onclick="salir()" style="background: #ffebeb; color: #ed4956; width: auto; padding: 0 10px;">Salir</button>
                </div>

                <div id="edit-form" class="card hidden">
                    <input type="file" id="edit-archivo-foto" accept="image/*">
                    <textarea id="edit-bio" rows="3" placeholder="Tu biografía..."></textarea>
                    <button id="btn-save" onclick="guardarTodo()">Guardar Cambios</button>
                </div>
                <div id="feed-personal" style="display: flex; flex-wrap: wrap; gap: 4px; padding-top: 20px;"></div>
            </div>
        </div>

        <nav class="navbar">
            <button class="nav-item" onclick="showView('home')">🏠</button>
            <button class="nav-item" onclick="showView('search')">🔍</button>
            <button class="nav-item" onclick="showView('upload')">➕</button>
            <button class="nav-item" onclick="showView('profile')">👤</button>
        </nav>
    </div>

    <script>
        const URL_PROYECTO = 'https://ieyquhkoxzvsxlhhdrba.supabase.co'; 
        const LLAVE_PROYECTO = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlleXF1aGtveHp2c3hsaGhkcmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTk3MTUsImV4cCI6MjA5Mjk5NTcxNX0.JIQnmMmkEXFU3VWMKUdMTKh-_SJ0ekEvkVOqM6LJpFs'; 
        const _supabase = supabase.createClient(URL_PROYECTO, LLAVE_PROYECTO);

        function showView(v) {
            ['home', 'search', 'upload', 'profile'].forEach(x => document.getElementById('view-'+x).classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            if(v==='home') cargarFotos();
            if(v==='profile') cargarDatosPerfil();
        }

        async function registro() {
            const e = document.getElementById('email').value; const p = document.getElementById('password').value; const u = document.getElementById('username').value;
            const { data, error } = await _supabase.auth.signUp({ email: e, password: p });
            if (error) return alert(error.message);
            await _supabase.from('perfiles').insert([{ id: data.user.id, username: u, email: e, descripcion: "Welcome to By His Side ✨" }]);
            alert("¡Registrado! Revisa tu correo o entra directamente.");
        }

        async function login() {
            const e = document.getElementById('email').value; const p = document.getElementById('password').value;
            const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
            if (error) alert(error.message); else location.reload();
        }

        async function salir() { await _supabase.auth.signOut(); location.reload(); }

        async function checarSesion() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) { 
                document.getElementById('auth-screen').classList.add('hidden'); 
                document.getElementById('main-app').classList.remove('hidden');
                cargarFotos(); 
            }
        }

        async function cargarFotos() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data: amigos } = await _supabase.from('contactos').select('contacto_email').eq('usuario_id', user.id);
            const lista = [user.email];
            if (amigos) amigos.forEach(a => lista.push(a.contacto_email));

            const { data: pubs } = await _supabase.from('publicaciones')
                .select('*').in('email_usuario', lista).order('creado_en', { ascending: false });

            const feed = document.getElementById('feed-general');
            feed.innerHTML = pubs?.length ? "" : "<p style='text-align:center; color:#888; margin-top:50px;'>No hay recuerdos aún.</p>";
            pubs?.forEach(p => {
                feed.innerHTML += `<div class="card" style="padding:0; overflow:hidden;">
                    <div style="padding:10px; font-weight:bold; color: #2d5a27;">@${p.nombre_usuario}</div>
                    <img src="${p['URL de la imagen']}" style="width:100%;">
                    <div style="padding:10px;">${p['descripción'] || ''}</div>
                </div>`;
            });
        }

        async function cargarDatosPerfil() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data: p } = await _supabase.from('perfiles').select('*').eq('id', user.id).maybeSingle();
            if(p) {
                document.getElementById('profile-alias').innerText = p.username;
                document.getElementById('profile-descripcion').innerText = p.descripcion || "Welcome to By His Side ✨";
                document.getElementById('my-profile-pic').src = p.foto_perfil || `https://api.dicebear.com/8.x/initials/svg?seed=${user.id}`;
            }
            
            const { data: misPubs } = await _supabase.from('publicaciones').select('*').eq('email_usuario', user.email);
            const feedP = document.getElementById('feed-personal');
            feedP.innerHTML = misPubs?.length ? "" : "<p style='width:100%; text-align:center; color:#888;'>Sin fotos.</p>";
            misPubs?.forEach(foto => {
                feedP.innerHTML += `<img src="${foto['URL de la imagen']}" style="width:32.3%; aspect-ratio:1/1; object-fit:cover; border-radius:4px;">`;
            });

            const { count: nP } = await _supabase.from('publicaciones').select('*', { count: 'exact', head: true }).eq('email_usuario', user.email);
            const { count: nA } = await _supabase.from('contactos').select('*', { count: 'exact', head: true }).eq('usuario_id', user.id);
            document.getElementById('num-posts').innerText = nP || 0;
            document.getElementById('num-amigos').innerText = nA || 0;
        }

        function toggleEdit() { document.getElementById('edit-form').classList.toggle('hidden'); }

        async function guardarTodo() {
            const btn = document.getElementById('btn-save'); btn.innerText = "Guardando...";
            const { data: { user } } = await _supabase.auth.getUser();
            const bio = document.getElementById('edit-bio').value;
            const inputFoto = document.getElementById('edit-archivo-foto');
            let url = document.getElementById('my-profile-pic').src;

            if (inputFoto.files[0]) {
                const n = `av_${user.id}_${Date.now()}`;
                await _supabase.storage.from('fotos').upload(n, inputFoto.files[0], { upsert: true });
                const { data } = _supabase.storage.from('fotos').getPublicUrl(n);
                url = data.publicUrl;
            }

            await _supabase.from('perfiles').upsert({ id: user.id, descripcion: bio, foto_perfil: url, email: user.email });
            alert("¡Perfil actualizado!");
            btn.innerText = "Guardar Cambios";
            cargarDatosPerfil(); toggleEdit();
        }

        async function subirFoto() {
            const btn = document.getElementById('btn-subir');
            const { data: { user } } = await _supabase.auth.getUser();
            const f = document.getElementById('archivo').files[0];
            if(!f) return alert("Selecciona foto");
            
            btn.innerText = "Subiendo...";
            const n = `${Date.now()}_img`;
            const { error: storageErr } = await _supabase.storage.from('fotos').upload(n, f);
            if(storageErr) return alert("Error storage: " + storageErr.message);

            const { data: uD } = _supabase.storage.from('fotos').getPublicUrl(n);
            const { data: p } = await _supabase.from('perfiles').select('username').eq('id', user.id).single();
            
            const { error: dbErr } = await _supabase.from('publicaciones').insert([{ 
                'URL de la imagen': uD.publicUrl, 
                'descripción': document.getElementById('pie').value, 
                'nombre_usuario': p.username, 
                'email_usuario': user.email 
            }]);
            
            if(dbErr) {
                alert("Error base de datos: " + dbErr.message);
            } else {
                alert("¡Recuerdo publicado!");
                document.getElementById('archivo').value = "";
                document.getElementById('pie').value = "";
                showView('home');
            }
            btn.innerText = "Publicar";
        }

        async function agregarPorNombre() {
            const n = document.getElementById('buscar-username').value;
            const { data: perf } = await _supabase.from('perfiles').select('email').eq('username', n).maybeSingle();
            if(!perf) return alert("No existe ese alias");
            const { data: { user } } = await _supabase.auth.getUser();
            await _supabase.from('contactos').insert([{ usuario_id: user.id, contacto_email: perf.email }]);
            alert("Amigo agregado");
            showView('home');
        }

        checarSesion();
    </script>
</body>
</html>
