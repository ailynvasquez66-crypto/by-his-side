```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By His Side</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f0f4f0; margin:0; }
.container { max-width:450px; margin:auto; padding:15px; }
.card { background:white; padding:15px; margin-bottom:10px; border-radius:10px; }
input, textarea { width:100%; padding:10px; margin:5px 0; }
button { width:100%; padding:10px; background:#2d5a27; color:white; border:none; }
.post-img { width:100%; border-radius:10px; margin-top:10px; }
.grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; }
</style>
</head>

<body>

<div id="auth">
  <div class="container card">
    <h2>By His Side</h2>
    <input id="email" placeholder="Correo">
    <input id="password" placeholder="Contraseña" type="password">
    <input id="username" placeholder="Alias (registro)">
    <button onclick="login()">Entrar</button>
    <button onclick="registro()">Crear cuenta</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="container">

    <button onclick="vista('home')">🏠</button>
    <button onclick="vista('upload')">➕</button>
    <button onclick="vista('profile')">👤</button>

    <div id="home"></div>

    <div id="upload" style="display:none;">
      <input type="file" id="file">
      <textarea id="desc"></textarea>
      <button onclick="subirFoto()">Subir</button>
    </div>

    <div id="profile" style="display:none;">
      <h3 id="alias"></h3>
      <div id="misFotos" class="grid"></div>
    </div>

  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://ieyquhkoxzvsxlhhdrba.supabase.co",
  "TU_ANON_KEY_AQUI"
);

// SESIÓN
async function init(){
  const { data:{user} } = await supabase.auth.getUser();
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    cargarFeed();
  }
}
init();

// LOGIN
async function login(){
  const email = emailInput();
  const password = passInput();
  const {error} = await supabase.auth.signInWithPassword({email,password});
  if(error) alert(error.message);
  else location.reload();
}

// REGISTRO
async function registro(){
  const email = emailInput();
  const password = passInput();
  const username = document.getElementById("username").value;

  const {data,error} = await supabase.auth.signUp({email,password});
  if(error) return alert(error.message);

  await supabase.from("perfiles").insert([{
    id:data.user.id,
    username,
    bio:""
  }]);

  alert("Cuenta creada");
}

// SUBIR FOTO
async function subirFoto(){
  const { data:{user} } = await supabase.auth.getUser();
  const file = document.getElementById("file").files[0];
  const desc = document.getElementById("desc").value;

  const name = "post_"+Date.now();

  await supabase.storage.from("fotos").upload(name,file);

  const {data:urlData} = supabase.storage.from("fotos").getPublicUrl(name);

  const {data:perfil} = await supabase.from("perfiles")
    .select("username")
    .eq("id",user.id)
    .single();

  await supabase.from("publicaciones").insert([{
    foto_url:urlData.publicUrl,
    descripcion:desc,
    nombre_usuario:perfil.username,
    email_usuario:user.email
  }]);

  cargarFeed();
}

// FEED
async function cargarFeed(){
  const {data} = await supabase.from("publicaciones")
    .select("*")
    .order("creado_en",{ascending:false});

  const cont = document.getElementById("home");
  cont.innerHTML="";

  data.forEach(p=>{
    cont.innerHTML += `
      <div class="card">
        <b>@${p.nombre_usuario}</b>
        <img src="${p.foto_url}" class="post-img">
        <p>${p.descripcion || ""}</p>
      </div>
    `;
  });
}

// PERFIL
async function cargarPerfil(){
  const { data:{user} } = await supabase.auth.getUser();

  const {data:perfil} = await supabase.from("perfiles")
    .select("*").eq("id",user.id).single();

  document.getElementById("alias").innerText="@"+perfil.username;

  const {data:fotos} = await supabase.from("publicaciones")
    .select("*").eq("email_usuario",user.email);

  const grid = document.getElementById("misFotos");
  grid.innerHTML="";

  fotos.forEach(f=>{
    grid.innerHTML+=`<img src="${f.foto_url}">`;
  });
}

// VISTAS
function vista(v){
  ["home","upload","profile"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });

  document.getElementById(v).style.display="block";

  if(v==="home") cargarFeed();
  if(v==="profile") cargarPerfil();
}

// HELPERS
function emailInput(){ return document.getElementById("email").value }
function passInput(){ return document.getElementById("password").value }
</script>

</body>
</html>
