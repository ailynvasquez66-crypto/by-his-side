<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By His Side 📸</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f4f0; margin: 0; padding-bottom: 80px; }
        
        /* ESTILO DEL LOGO REPARADO */
        .titulo-cursivo { 
            font-family: 'Dancing Script', cursive; 
            color: #2d5a27; 
            text-align: center;
        }
        
        header { background: white; border-bottom: 1px solid #c2d6c2; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 100; }
        
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; box-sizing: border-box; }
        .card { background: white; border: 1px solid #c2d6c2; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #a3bfa3; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #2d5a27; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .profile-header { display: flex; align-items: center; padding: 20px 0; }
        .profile-pic { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #2d5a27; object-fit: cover; background: #eee; }
        
        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #c2d6c2; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { cursor: pointer; font-size: 24px; background: none; border: none; padding: 10px; }
        .hidden { display: none; }
        
        .btn-edit { background: #eef3ee; color: #2d5a27; border: 1px solid #c2d6c2; margin-top: 10px; font-size: 14px; padding: 8px; }
        .grid-perfil { display: flex; flex-wrap: wrap; gap: 4px; padding-top: 20px; }
        .grid-item { width: calc(33.33% - 4px); aspect-ratio: 1/1; overflow: hidden; background: #ddd; border-radius: 4px; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <div class="card" style="text-align: center;">
            <h2 class="titulo-cursivo" style="font-size: 42px;">By His Side</h2>
            <input type="text" id="username" placeholder="Tu alias">
            <input type="text" id="email" placeholder="Correo">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
            <button onclick="registro()" style="background: #6fb98f; margin-top: 10px;">Crear cuenta</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <!-- LOGO RESTAURADO AQUÍ -->
            <div class="titulo-cursivo" style="font-size: 28px; margin: 0;">By His Side</div>
        </header>
        
        <div class="container">
            <div id="view-home"><div id="feed-general"></div></div>
            
            <div id="view-search" class="hidden">
                <div class="card">
                    <h3 class="titulo-cursivo" style="font-size: 22px;">Buscar Amigos</h3>
                    <input type="text" id="buscar-username" placeholder="Alias exacto">
                    <button onclick="agregarPorNombre()">Agregar</button>
                </div>
            </div>
            
            <div id="view-upload" class="hidden">
                <div class="card">
                    <h3 class="titulo-cursivo" style="font-size: 22px;">Nuevo Recuerdo</h3>
                    <input type="file" id="archivo" accept="image/*">
                    <input type="text" id="pie" placeholder="Descripción...">
                    <button id="btn-subir" onclick="subirFoto()">Publicar</button>
                </div>
            </div>

            <div id="view-edit-profile" class="hidden">
                <div class="card">
                    <h3 class="titulo-cursivo" style="font-size: 22px;">Editar Perfil</h3>
                    <input type="text" id="new-username" placeholder="Nuevo alias">
                    <p style="font-size: 14px; margin-bottom: 5px;">Foto de perfil desde galería:</p>
                    <input type="file" id="new-profile-file" accept="image/*">
                    <button id="btn-actualizar" onclick="actualizarPerfil()">Guardar Cambios</button>
                    <button onclick="showView('profile')" style="background:none; color:gray; margin-top:10px;">Cancelar</button>
                </div>
            </div>

            <div id="view-profile" class="hidden">
                <div class="profile-header">
                    <img id="my-profile-pic" class="profile-pic" src="">
                    <div style="flex:1; display:flex; justify-content:space-around; text-align:center;">
                        <div><span style="font-weight:bold; display:block;" id="num-posts">0</span><span>recuerdos</span></div>
                        <div><span style="font-weight:bold; display:block;" id="num-amigos">0</span><span>amigos</span></div>
                    </div>
                </div>
                <div id="profile-alias" style="font-weight:bold; font-size:18px;">@cargando</div>
                <p id="profile-descripcion">Welcome to By His Side ✨</p>
                <button class="btn-edit" onclick="showView('edit-profile')">Editar Perfil</button>
                <button onclick="salir()" style="background: #ffebeb; color: #ed4956; margin-top:10px;">Cerrar Sesión</button>
                <div id="feed-personal" class="grid-perfil"></div>
            </div>
        </div>

        <nav class="navbar">
            <button class="nav-item" onclick="showView('home')">🏠</button>
            <button class="nav-item" onclick="showView('search')">🔍</button>
            <button class="nav-item" onclick="showView('upload')">➕</button>
            <button class="nav-item" onclick="showView('profile')">👤</button>
        </nav>
    </div>

    <script>
        const URL_PROYECTO = 'https://ieyquhkoxzvsxlhhdrba.supabase.co'; 
        const LLAVE_PROYECTO = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlleXF1aGtveHp2c3hsaGhkcmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTk3MTUsImV4cCI6MjA5Mjk5NTcxNX0.JIQnmMmkEXFU3VWMKUdMTKh-_SJ0ekEvkVOqM6LJpFs'; 
        const _supabase = supabase.createClient(URL_PROYECTO, LLAVE_PROYECTO);

        function showView(v) {
            ['home', 'search', 'upload', 'profile', 'edit-profile'].forEach(x => {
                const el = document.getElementById('view-'+x);
                if(el) el.classList.add('hidden');
            });
            document.getElementById('view-'+v).classList.remove('hidden');
            if(v==='home') cargarFotos();
            if(v==='profile') cargarDatosPerfil();
        }

        async function registro() {
            const e = document.getElementById('email').value; const p = document.getElementById('password').value; const u = document.getElementById('username').value;
            const { data, error } = await _supabase.auth.signUp({ email: e, password: p });
            if (error) return alert(error.message);
            await _supabase.from('perfiles').insert([{ id: data.user.id, username: u, email: e }]);
            alert("¡Registrado!");
        }

        async function login() {
            const e = document.getElementById('email').value; const p = document.getElementById('password').value;
            const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
            if (error) alert(error.message); else location.reload();
        }

        async function salir() { await _supabase.auth.signOut(); location.reload(); }

        async function checarSesion() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) { 
                document.getElementById('auth-screen').classList.add('hidden'); 
                document.getElementById('main-app').classList.remove('hidden');
                cargarFotos(); 
            }
        }

        async function cargarFotos() {
            const { data: { user } } = await _supabase.auth.getUser();
            const feed = document.getElementById('feed-general');
            feed.innerHTML = "";
            const { data: pubs } = await _supabase.from('publicaciones').select('*').neq('email_usuario', user.email).order('creado_en', { ascending: false });
            pubs?.forEach(p => {
                feed.innerHTML += `<div class="card" style="padding:0; overflow:hidden;"><div style="padding:10px; font-weight:bold;">@${p.nombre_usuario}</div><img src="${p['URL de la imagen']}" style="width:100%;"><div style="padding:10px;">${p['descripción'] || ''}</div></div>`;
            });
        }

        async function cargarDatosPerfil() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data: p } = await _supabase.from('perfiles').select('*').eq('id', user.id).single();
            if(p) {
                document.getElementById('profile-alias').innerText = "@" + p.username;
                const fotoParaMostrar = p.foto_perfil ? p.foto_perfil : `https://api.dicebear.com/8.x/initials/svg?seed=${p.username}`;
                document.getElementById('my-profile-pic').src = fotoParaMostrar;
            }
            const { data: misPubs } = await _supabase.from('publicaciones').select('*').eq('email_usuario', user.email).order('creado_en', { ascending: false });
            document.getElementById('num-posts').innerText = misPubs ? misPubs.length : 0;
            const feedPersonal = document.getElementById('feed-personal');
            feedPersonal.innerHTML = "";
            misPubs?.forEach(pub => {
                feedPersonal.innerHTML += `<div class="grid-item"><img src="${pub['URL de la imagen']}"></div>`;
            });
        }

        async function actualizarPerfil() {
            const btn = document.getElementById('btn-actualizar');
            const { data: { user } } = await _supabase.auth.getUser();
            const nuevoUser = document.getElementById('new-username').value;
            const archivo = document.getElementById('new-profile-file').files[0];
            btn.innerText = "Guardando...";
            let cambios = {};
            if(nuevoUser) cambios.username = nuevoUser;
            if(archivo) {
                const nombreFoto = `perfil_${user.id}_${Date.now()}`;
                await _supabase.storage.from('fotos').upload(nombreFoto, archivo);
                const { data: uD } = _supabase.storage.from('fotos').getPublicUrl(nombreFoto);
                cambios.foto_perfil = uD.publicUrl;
            }
            const { error } = await _supabase.from('perfiles').update(cambios).eq('id', user.id);
            if(error) alert("Error"); else location.reload();
        }

        async function subirFoto() {
            const btn = document.getElementById('btn-subir');
            const { data: { user } } = await _supabase.auth.getUser();
            const f = document.getElementById('archivo').files[0];
            if(!f) return alert("Selecciona foto");
            btn.innerText = "Subiendo...";
            const n = `${Date.now()}_img`;
            await _supabase.storage.from('fotos').upload(n, f);
            const { data: uD } = _supabase.storage.from('fotos').getPublicUrl(n);
            const { data: p } = await _supabase.from('perfiles').select('username').eq('id', user.id).single();
            await _supabase.from('publicaciones').insert([{ 'URL de la imagen': uD.publicUrl, 'descripción': document.getElementById('pie').value, 'nombre_usuario': p ? p.username : 'Usuario', 'email_usuario': user.email }]);
            alert("¡Publicado!");
            location.reload();
        }

        async function agregarPorNombre() {
            const n = document.getElementById('buscar-username').value;
            const { data: perf } = await _supabase.from('perfiles').select('email').eq('username', n).maybeSingle();
            if(!perf) return alert("No existe");
            const { data: { user } } = await _supabase.auth.getUser();
            await _supabase.from('contactos').insert([{ usuario_id: user.id, contacto_email: perf.email }]);
            alert("Agregado");
        }
        checarSesion();
    </script>
</body>
</html>
