<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>By His Side</title>

    <!-- CONFIGURACIÓN PWA PARA IPHONE -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="By His Side">
    
    <!-- <--- PEGA TU URL AQUÍ ABAJO ENTRE LAS COMILLAS ---> -->
    <link rel="apple-touch-icon" href="https://ieyquhkoxzvsxlhhdrba.supabase.co/storage/v1/object/public/fotos/logo.png">
    <link rel="icon" href="https://ieyquhkoxzvsxlhhdrba.supabase.co/storage/v1/object/public/fotos/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f4f0; margin: 0; padding-bottom: 90px; }
        .titulo-cursivo { font-family: 'Dancing Script', cursive; color: #2d5a27; margin: 0; }
        header { background: white; border-bottom: 1px solid #c2d6c2; padding: 10px; display: flex; justify-content: center; align-items: center; position: sticky; top: 0; z-index: 100; min-height: 65px; padding-top: env(safe-area-inset-top); }
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .card { background: white; border: 1px solid #c2d6c2; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #a3bfa3; border-radius: 8px; font-size: 16px; }
        button { width: 100%; background: #2d5a27; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #6b8e67; cursor: not-allowed; }
        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #c2d6c2; display: flex; justify-content: space-around; padding: 15px 0; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { font-size: 24px; background: none; border: none; }
        .hidden { display: none; }
        .post-img { width: 100%; border-radius: 8px; margin: 10px 0; }
        .grid-perfil { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
        .grid-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; }
        #modal-editar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- PANTALLA DE ACCESO -->
    <div id="auth-screen" class="container">
        <div class="card" style="text-align: center;">
            <h1 class="titulo-cursivo" style="font-size: 45px;">By His Side</h1>
            <input type="text" id="username" placeholder="Tu alias">
            <input type="email" id="email" placeholder="Correo">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
            <button onclick="registro()" style="background: #6fb98f; margin-top: 10px;">Crear cuenta</button>
        </div>
    </div>

    <!-- APLICACIÓN PRINCIPAL -->
    <div id="main-app" class="hidden">
        <header><h2 class="titulo-cursivo" style="font-size: 32px;">By His Side</h2></header>
        <div class="container">
            <div id="view-home"><div id="feed-general"></div></div>
            <div id="view-search" class="hidden"><div class="card"><h3>Buscar Amigos</h3><input type="text" placeholder="Alias"><button>Agregar</button></div></div>
            <div id="view-upload" class="hidden">
                <div class="card">
                    <h3 class="titulo-cursivo">Nuevo Recuerdo</h3>
                    <input type="file" id="archivo" accept="image/*">
                    <input type="text" id="pie" placeholder="Escribe algo...">
                    <button id="btn-subir" onclick="subirFoto()">Publicar</button>
                </div>
            </div>
            <div id="view-profile" class="hidden">
                <div class="card" style="text-align: center;">
                    <img id="my-profile-pic" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #2d5a27; margin-bottom: 10px;">
                    <h3 id="profile-alias">@usuario</h3>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="abrirModalEdicion()" style="background: #eef2ee; color: #2d5a27; border: 1px solid #2d5a27;">Editar Perfil</button>
                        <button onclick="salir()" style="background: #ed4956;">Salir</button>
                    </div>
                </div>
                <div id="feed-personal" class="grid-perfil"></div>
            </div>
        </div>
        <nav class="navbar">
            <button class="nav-item" onclick="showView('home')">🏠</button>
            <button class="nav-item" onclick="showView('search')">🔍</button>
            <button class="nav-item" onclick="showView('upload')">➕</button>
            <button class="nav-item" onclick="showView('profile')">👤</button>
        </nav>
    </div>

    <!-- MODAL DE EDICIÓN -->
    <div id="modal-editar" class="hidden">
        <div class="card" style="width: 90%; max-width: 350px;">
            <h3 class="titulo-cursivo" style="text-align: center;">Editar Perfil</h3>
            <input type="file" id="edit-foto" accept="image/*">
            <input type="text" id="edit-alias" placeholder="Nuevo alias">
            <button onclick="guardarPerfil()" id="btn-guardar-p">Guardar Cambios</button>
            <button onclick="cerrarModalEdicion()" style="background: #ccc; margin-top: 10px;">Cancelar</button>
        </div>
    </div>

    <script>
        const URL_PROYECTO = 'https://ieyquhkoxzvsxlhhdrba.supabase.co'; 
        const LLAVE_PROYECTO = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlleXF1aGtveHp2c3hsaGhkcmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTk3MTUsImV4cCI6MjA5Mjk5NTcxNX0.JIQnmMmkEXFU3VWMKUdMTKh-_SJ0ekEvkVOqM6LJpFs'; 
        const _supabase = supabase.createClient(URL_PROYECTO, LLAVE_PROYECTO);

        function showView(v) {
            ['home', 'search', 'upload', 'profile'].forEach(x => document.getElementById('view-'+x).classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            if(v==='home') cargarFotosAmigos();
            if(v==='profile') cargarDatosPerfil();
        }

        async function login() {
            const e = document.getElementById('email').value; const p = document.getElementById('password').value;
            const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
            if (error) alert("Error: " + error.message); else location.reload();
        }

        async function registro() {
            const e = document.getElementById('email').value; const p = document.getElementById('password').value; const u = document.getElementById('username').value;
            const { data, error } = await _supabase.auth.signUp({ email: e, password: p });
            if (error) return alert(error.message);
            await _supabase.from('perfiles').insert([{ id: data.user.id, username: u, email: e }]);
            alert("¡Cuenta creada!");
        }

        async function checarSesion() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) { 
                document.getElementById('auth-screen').classList.add('hidden'); 
                document.getElementById('main-app').classList.remove('hidden');
                cargarFotosAmigos(); 
            }
        }

        async function subirFoto() {
            const btn = document.getElementById('btn-subir');
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) return alert("Sesión expirada");
            const f = document.getElementById('archivo').files[0];
            if(!f) return alert("Selecciona una foto");
            btn.innerText = "Subiendo...";
            btn.disabled = true;
            const n = `post_${Date.now()}`;
            await _supabase.storage.from('fotos').upload(n, f);
            const { data: uD } = _supabase.storage.from('fotos').getPublicUrl(n);
            const { data: p } = await _supabase.from('perfiles').select('username').eq('id', user.id).single();
            await _supabase.from('publicaciones').insert([{ 'URL de la imagen': uD.publicUrl, 'descripción': document.getElementById('pie').value, 'nombre_usuario': p.username, 'email_usuario': user.email }]);
            location.reload();
        }

        async function cargarFotosAmigos() {
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) return;
            const { data: pubs } = await _supabase.from('publicaciones').select('*').neq('email_usuario', user.email).order('creado_en', { ascending: false });
            const feed = document.getElementById('feed-general');
            feed.innerHTML = "";
            pubs?.forEach(p => {
                feed.innerHTML += `<div class="card"><div style="font-weight:bold; color:#2d5a27;">@${p.nombre_usuario}</div><img src="${p['URL de la imagen']}" class="post-img"><div>${p['descripción'] || ''}</div></div>`;
            });
        }

        async function cargarDatosPerfil() {
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) return;
            const { data: p } = await _supabase.from('perfiles').select('*').eq('id', user.id).single();
            if(p) {
                document.getElementById('profile-alias').innerText = "@" + p.username;
                document.getElementById('my-profile-pic').src = p.foto_perfil || `https://api.dicebear.com/8.x/initials/svg?seed=${p.username}`;
            }
            const { data: misPubs } = await _supabase.from('publicaciones').select('*').eq('email_usuario', user.email).order('creado_en', { ascending: false });
            const feedP = document.getElementById('feed-personal');
            feedP.innerHTML = "";
            misPubs?.forEach(pub => {
                feedP.innerHTML += `<div class="grid-item"><img src="${pub['URL de la imagen']}"></div>`;
            });
        }

        function abrirModalEdicion() { document.getElementById('modal-editar').classList.remove('hidden'); }
        function cerrarModalEdicion() { document.getElementById('modal-editar').classList.add('hidden'); }

        async function guardarPerfil() {
            const btn = document.getElementById('btn-guardar-p');
            const { data: { user }, error: authErr } = await _supabase.auth.getUser();
            if(!user || authErr) return location.reload();

            const nuevoAlias = document.getElementById('edit-alias').value;
            const f = document.getElementById('edit-foto').files[0];
            btn.innerText = "Guardando...";
            btn.disabled = true;

            try {
                let updateData = {};
                if(nuevoAlias) updateData.username = nuevoAlias;
                if(f) {
                    const n = `avatar_${user.id}_${Date.now()}`;
                    await _supabase.storage.from('fotos').upload(n, f);
                    const { data: uD } = _supabase.storage.from('fotos').getPublicUrl(n);
                    updateData.foto_perfil = uD.publicUrl;
                }
                await _supabase.from('perfiles').update(updateData).eq('id', user.id);
                if(nuevoAlias) await _supabase.from('publicaciones').update({nombre_usuario: nuevoAlias}).eq('email_usuario', user.email);
                location.reload();
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "Guardar Cambios";
                btn.disabled = false;
            }
        }

        async function salir() { await _supabase.auth.signOut(); location.reload(); }
        checarSesion();
    </script>
</body>
</html>
