<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By His Side 📸</title>
    
    <!-- ICONO PARA PANTALLA DE INICIO -->
    <!-- Nota: Para que no salga la "B", sube la imagen recortada como cuadrado a Supabase y pon el link aquí -->
    <link rel="apple-touch-icon" href="TU_URL_DE_IMAGEN_CUADRADA_AQUI">
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f4f0; margin: 0; padding-bottom: 80px; }
        
        /* CONTENEDOR DEL LOGO EN EL HEADER */
        .logo-container {
            width: 100%;
            height: 60px; /* Ajusta la altura que quieras */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-img {
            height: 100%; /* Hace que se ajuste a lo alto */
            width: auto;   /* Mantiene la proporción sin estirar */
            object-fit: contain; /* Evita los bordes blancos si el contenedor es distinto */
        }

        .titulo-cursivo { font-family: 'Dancing Script', cursive; color: #2d5a27; text-align: center; }
        header { background: white; border-bottom: 1px solid #c2d6c2; padding: 5px; position: sticky; top: 0; z-index: 100; }
        
        /* Resto de estilos del proyecto */
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; box-sizing: border-box; }
        .card { background: white; border: 1px solid #c2d6c2; padding: 20px; margin-bottom: 15px; border-radius: 12px; }
        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #c2d6c2; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="main-app">
        <header>
            <div class="logo-container">
                <!-- Aquí pones el link de Pinterest o el de tu Supabase -->
                <img src="https://i.pinimg.com/736x/0a/61/0a/0a610a8e2e2e75e1b2e2e75e1b2e2e75.jpg" class="logo-img" alt="By His Side">
            </div>
        </header>

        <div class="container">
            <!-- El resto de tu contenido -->
        </div>
    </div>

</body>
</html>
