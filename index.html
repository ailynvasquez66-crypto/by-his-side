<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>By His Side</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="https://i1-c.pinimg.com/736x/18/9f/75/189f7556dcb1da733939f8b668bdde68.jpg">
    <link rel="icon" href="https://i1-c.pinimg.com/736x/18/9f/75/189f7556dcb1da733939f8b668bdde68.jpg" type="image/jpeg">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f4f0; margin: 0; padding-bottom: 90px; }
        .titulo-cursivo { font-family: 'Dancing Script', cursive; color: #2d5a27; margin: 0; }
        header { background: white; border-bottom: 1px solid #c2d6c2; padding: 10px; display: flex; justify-content: center; align-items: center; position: sticky; top: 0; z-index: 100; min-height: 65px; padding-top: env(safe-area-inset-top); }
        .container { width: 100%; max-width: 450px; margin: auto; padding: 15px; }
        .card { background: white; border: 1px solid #c2d6c2; padding: 15px; margin-bottom: 15px; border-radius: 12px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #a3bfa3; border-radius: 8px; font-size: 16px; font-family: inherit; }
        button { width: 100%; background: #2d5a27; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; }
        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #c2d6c2; display: flex; justify-content: space-around; padding: 15px 0; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { font-size: 24px; background: none; border: none; padding: 10px; }
        .hidden { display: none !important; }
        .post-img { width: 100%; border-radius: 8px; margin: 10px 0; background: #eee; min-height: 200px; object-fit: cover; }
        .grid-perfil { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
        .grid-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; cursor: pointer; background: #eee; }
        
        /* MODALES */
        .modal-full { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 15px; padding: 0; overflow: hidden; position: relative; }
        .header-modal { position: absolute; top: calc(env(safe-area-inset-top) + 15px); left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; z-index: 3100; }
        .btn-modal-icon { background: rgba(0,0,0,0.6); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 22px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        #img-grande { width: 100%; max-height: 60vh; object-fit: contain; background: #000; display: block; margin-top: 70px; }
        .user-bio { font-size: 14px; color: #555; margin: 10px 0; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <div class="card" style="text-align: center;">
            <h1 class="titulo-cursivo" style="font-size: 45px;">By His Side</h1>
            <input type="text" id="reg-username" placeholder="Tu alias (solo para registro)">
            <input type="email" id="email" placeholder="Correo">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
            <button onclick="registro()" style="background: #6fb98f; margin-top: 10px;">Crear cuenta</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header><h2 class="titulo-cursivo" style="font-size: 32px;">By His Side</h2></header>
        <div class="container">
            
            <div id="view-home">
                <div id="feed-general"></div>
            </div>

            <div id="view-search" class="hidden">
                <div class="card">
                    <h3 class="titulo-cursivo">Buscar Amigos</h3>
                    <input type="text" id="busqueda-usuario" placeholder="Nombre de usuario...">
                    <button onclick="buscarAmigo()">Buscar</button>
                </div>
                <div id="resultados-busqueda"></div>
            </div>

            <div id="view-upload" class="hidden">
                <div class="card">
                    <h3 class="titulo-cursivo">Nuevo Recuerdo</h3>
                    <input type="file" id="archivo" accept="image/*">
                    <textarea id="pie" placeholder="Escribe la historia de este momento..."></textarea>
                    <button id="btn-subir" onclick="subirFoto()">Publicar</button>
                </div>
            </div>

            <div id="view-profile" class="hidden">
                <div class="card" style="text-align: center;">
                    <img id="my-profile-pic" style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #2d5a27;">
                    <h3 id="profile-alias" style="margin: 5px 0;">@usuario</h3>
                    <p id="profile-bio" class="user-bio"></p>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="abrirModalEdicion()" style="background: #eef2ee; color: #2d5a27; border: 1px solid #2d5a27;">Editar</button>
                        <button onclick="salir()" style="background: #ed4956;">Salir</button>
                    </div>
                </div>
                <div id="feed-personal" class="grid-perfil"></div>
            </div>
        </div>

        <nav class="navbar">
            <button class="nav-item" onclick="showView('home')">🏠</button>
            <button class="nav-item" onclick="showView('search')">🔍</button>
            <button class="nav-item" onclick="showView('upload')">➕</button>
            <button class="nav-item" onclick="showView('profile')">👤</button>
        </nav>
    </div>

    <script>
        // ... (Tu código de Supabase y funciones que ya funcionan perfecto)
        const URL_PROYECTO = 'https://ieyquhkoxzvsxlhhdrba.supabase.co'; 
        const LLAVE_PROYECTO = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlleXF1aGtveHp2c3hsaGhkcmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MTk3MTUsImV4cCI6MjA5Mjk5NTcxNX0.JIQnmMmkEXFU3VWMKUdMTKh-_SJ0ekEvkVOqM6LJpFs'; 
        const _supabase = supabase.createClient(URL_PROYECTO, LLAVE_PROYECTO);
        let idFotoActual = null;

        async function checarSesion() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) { 
                document.getElementById('auth-screen').classList.add('hidden'); 
                document.getElementById('main-app').classList.remove('hidden');
                showView('home'); 
            }
        }

        async function login() {
            const e = document.getElementById('email').value; 
            const p = document.getElementById('password').value;
            const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
            if (error) alert("Error: " + error.message); else location.reload();
        }

        async function registro() {
            const e = document.getElementById('email').value; 
            const p = document.getElementById('password').value; 
            const u = document.getElementById('reg-username').value;
            if(!u) return alert("Escribe un alias para tu perfil");
            
            const { data, error } = await _supabase.auth.signUp({ email: e, password: p });
            if (error) return alert(error.message);
            
            if(data.user) {
                await _supabase.from('perfiles').insert([{ id: data.user.id, username: u, email: e, bio: "" }]);
                alert("¡Cuenta creada! Revisa tu correo o intenta entrar.");
            }
        }

        function showView(v) {
            ['home', 'search', 'upload', 'profile'].forEach(x => {
                const el = document.getElementById('view-'+x);
                if(el) el.classList.add('hidden');
            });
            const target = document.getElementById('view-'+v);
            if(target) target.classList.remove('hidden');
            
            if(v==='home') cargarFotosAmigos();
            if(v==='profile') cargarDatosPerfil();
        }

        async function cargarDatosPerfil() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) return;

            const { data: p } = await _supabase.from('perfiles').select('*').eq('id', user.id).single();
            if (p) {
                document.getElementById('profile-alias').innerText = "@" + p.username;
                document.getElementById('profile-bio').innerText = p.bio || "Sin biografía";
                document.getElementById('my-profile-pic').src = p.foto_perfil || 'https://api.dicebear.com/8.x/initials/svg?seed=' + p.username;
            }

            const { data: misPubs, error: errLectura } = await _supabase.from('publicaciones')
                .select('*')
                .eq('email_usuario', user.email)
                .order('creado_en', { ascending: false });

            const feedP = document.getElementById('feed-personal');
            if(feedP) {
                feedP.innerHTML = ""; 
                misPubs?.forEach(pub => {
                    feedP.innerHTML += `
                        <div class="grid-item" onclick="verFoto('${pub.foto_url}', '${(pub.descripcion || "").replace(/'/g, "\\'")}', '${new Date(pub.creado_en).toLocaleDateString()}', '${pub.id}', true)">
                            <img src="${pub.foto_url}">
                        </div>`;
                });
            }
        }

        async function cargarFotosAmigos() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { data: pubs } = await _supabase.from('publicaciones')
                .select('*')
                .neq('email_usuario', user.email)
                .order('creado_en', { ascending: false });

            const feed = document.getElementById('feed-general');
            if(feed) {
                feed.innerHTML = pubs?.length ? "" : "<p style='text-align:center; color:#666;'>No hay publicaciones nuevas.</p>";
                pubs?.forEach(p => {
                    feed.innerHTML += `
                        <div class="card">
                            <div style="font-weight:bold; color:#2d5a27; margin-bottom:8px;">@${p.nombre_usuario}</div>
                            <img src="${p.foto_url}" class="post-img" onclick="verFoto('${p.foto_url}', '${(p.descripcion || "").replace(/'/g, "\\'")}', '${new Date(p.creado_en).toLocaleDateString()}', '${p.id}', false)">
                            <div style="font-size:14px; margin-top:8px;">${p.descripcion || ""}</div>
                        </div>`;
                });
            }
        }
        
        // El resto de funciones se mantienen iguales...
        checarSesion();
    </script>
</body>
</html>
